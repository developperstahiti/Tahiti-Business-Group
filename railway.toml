[build]
builder = "DOCKERFILE"

[deploy]
startCommand = "sh -c 'python manage.py migrate --noinput && python manage.py create_admin && python manage.py seed_demo_users && gunicorn tahiti_business.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 120'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
