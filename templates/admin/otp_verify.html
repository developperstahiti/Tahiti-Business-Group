<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Vérification OTP — TBG Gestion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .otp-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.1); padding: 40px 36px; max-width: 400px; width: 100%; }
    .otp-card h1 { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 8px; color: #1a1a1a; }
    .otp-card p { font-size: 14px; color: #666; text-align: center; margin-bottom: 24px; }
    .otp-card label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: #333; }
    .otp-card input[type="text"] { width: 100%; padding: 12px 16px; font-size: 24px; letter-spacing: 8px; text-align: center; border: 2px solid #ddd; border-radius: 8px; outline: none; transition: border-color .2s; }
    .otp-card input[type="text"]:focus { border-color: #417690; }
    .otp-card button { width: 100%; padding: 12px; font-size: 16px; font-weight: 600; color: #fff; background: #417690; border: none; border-radius: 8px; cursor: pointer; margin-top: 16px; transition: background .2s; }
    .otp-card button:hover { background: #205067; }
    .error { background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c; padding: 10px 14px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; text-align: center; }
  </style>
</head>
<body>
  <div class="otp-card">
    <h1>TBG Gestion</h1>
    <p>Saisissez le code à 6 chiffres de votre application d'authentification</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <label for="otp_token">Code OTP</label>
      <input type="text" name="otp_token" id="otp_token" maxlength="6" pattern="\d{6}" autocomplete="one-time-code" autofocus required placeholder="000000">
      <button type="submit">Vérifier</button>
    </form>
  </div>
</body>
</html>
