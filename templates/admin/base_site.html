{% extends "admin/base.html" %}
{% load static %}

{% block title %}{{ title }} | Administration TBG{% endblock %}

{% block branding %}
<h1 id="site-name">
  <a href="{% url 'admin:index' %}">
    <img src="{% static 'img/logo-tbg.webp' %}" alt="Tahiti Business Group" style="height:28px;vertical-align:middle;margin-right:10px">
    <span style="vertical-align:middle">Administration</span>
  </a>
</h1>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
/* ══════════════════════════════════════════════════════
   TBG ADMIN — Force light theme everywhere
   Matches the custom dashboard style (white/blue/gray)
   ══════════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

/* ── NUCLEAR: Override ALL Django CSS variables ─────── */
html, :root,
html[data-theme="dark"],
html[data-theme="light"],
html[data-theme="auto"],
[data-theme="dark"],
[data-theme="auto"] {
  --primary: #1a6cf1 !important;
  --accent: #1a6cf1 !important;
  --secondary: #f9fafb !important;
  --primary-fg: #fff !important;
  --body-fg: #374151 !important;
  --body-bg: #f9fafb !important;
  --body-quiet-color: #6b7280 !important;
  --body-loud-color: #111827 !important;
  --header-color: #111827 !important;
  --header-branding-color: #111827 !important;
  --header-bg: #fff !important;
  --header-link-color: #6b7280 !important;
  --breadcrumbs-fg: #6b7280 !important;
  --breadcrumbs-link-fg: #1a6cf1 !important;
  --breadcrumbs-bg: #fff !important;
  --link-fg: #1a6cf1 !important;
  --link-hover-color: #1558c8 !important;
  --link-selected-fg: #1558c8 !important;
  --hairline-color: #e5e7eb !important;
  --border-color: #e5e7eb !important;
  --error-fg: #ef4444 !important;
  --message-success-bg: #ecfdf5 !important;
  --message-warning-bg: #fffbeb !important;
  --message-error-bg: #fef2f2 !important;
  --darkened-bg: #f3f4f6 !important;
  --selected-bg: #eff6ff !important;
  --selected-row: #eff6ff !important;
  --button-fg: #fff !important;
  --button-bg: #1a6cf1 !important;
  --button-hover-bg: #1558c8 !important;
  --default-button-bg: #1a6cf1 !important;
  --default-button-hover-bg: #1558c8 !important;
  --close-button-bg: #6b7280 !important;
  --close-button-hover-bg: #374151 !important;
  --delete-button-bg: #ef4444 !important;
  --delete-button-hover-bg: #dc2626 !important;
  --object-tools-fg: #374151 !important;
  --object-tools-bg: #fff !important;
  --object-tools-hover-bg: #eff6ff !important;
  color-scheme: light !important;
}

/* Force light color scheme on everything */
@media (prefers-color-scheme: dark) {
  html, :root,
  html[data-theme="dark"],
  html[data-theme="auto"] {
    --primary: #1a6cf1 !important;
    --secondary: #f9fafb !important;
    --primary-fg: #fff !important;
    --body-fg: #374151 !important;
    --body-bg: #f9fafb !important;
    --body-quiet-color: #6b7280 !important;
    --body-loud-color: #111827 !important;
    --header-color: #111827 !important;
    --header-branding-color: #111827 !important;
    --header-bg: #fff !important;
    --header-link-color: #6b7280 !important;
    --breadcrumbs-fg: #6b7280 !important;
    --breadcrumbs-link-fg: #1a6cf1 !important;
    --breadcrumbs-bg: #fff !important;
    --link-fg: #1a6cf1 !important;
    --link-hover-color: #1558c8 !important;
    --link-selected-fg: #1558c8 !important;
    --hairline-color: #e5e7eb !important;
    --border-color: #e5e7eb !important;
    --darkened-bg: #f3f4f6 !important;
    --selected-bg: #eff6ff !important;
    --selected-row: #eff6ff !important;
    color-scheme: light !important;
  }
}

* { font-family: 'Inter', Arial, sans-serif !important; }

body {
  background: #f9fafb !important;
  color: #374151 !important;
}

/* ── Header ─────────────────────────────────── */
#header {
  background: #fff !important;
  border-bottom: 1px solid #e5e7eb !important;
  padding: 12px 28px !important;
  box-shadow: 0 1px 3px rgba(0,0,0,.04) !important;
  color: #111827 !important;
}
#site-name a {
  color: #111827 !important;
  font-weight: 800 !important;
  font-size: 1rem !important;
}
#user-tools {
  font-size: 12px !important;
  color: #6b7280 !important;
}
#user-tools a {
  color: #1a6cf1 !important;
  font-weight: 600 !important;
}
#user-tools a:hover { color: #1558c8 !important; }

/* ── Breadcrumbs ─────────────────────────────── */
div.breadcrumbs {
  background: #fff !important;
  color: #6b7280 !important;
  padding: 10px 28px !important;
  font-size: 12px !important;
  font-weight: 500 !important;
  border-bottom: 1px solid #e5e7eb !important;
}
div.breadcrumbs a { color: #1a6cf1 !important; font-weight: 600 !important; }

/* ── Container & Content ─────────────────────── */
#container { background: #f9fafb !important; }
#content {
  padding: 24px 28px !important;
  max-width: 1400px !important;
  background: transparent !important;
  color: #374151 !important;
}
#content h1 {
  color: #111827 !important;
  font-size: 1.4rem !important;
  font-weight: 800 !important;
  letter-spacing: -.02em !important;
  padding-bottom: 0 !important;
  border-bottom: none !important;
  margin-bottom: 20px !important;
}
#content-main { background: transparent !important; }

/* ── Modules ─────────────────────────────────── */
.module {
  background: #fff !important;
  border: 1px solid #e5e7eb !important;
  border-radius: 12px !important;
  overflow: hidden !important;
  box-shadow: 0 1px 3px rgba(0,0,0,.04) !important;
  margin-bottom: 20px !important;
}
.module h2, .module caption, .inline-group h2 {
  background: #f9fafb !important;
  color: #111827 !important;
  font-size: 12px !important;
  font-weight: 700 !important;
  letter-spacing: .02em !important;
  text-transform: uppercase !important;
  padding: 12px 16px !important;
  border-bottom: 1px solid #e5e7eb !important;
  border-radius: 0 !important;
}

/* ── All tables inside modules ────────────────── */
.module table {
  background: #fff !important;
  width: 100% !important;
}
.module th {
  background: #f9fafb !important;
  color: #374151 !important;
  padding: 10px 16px !important;
  font-size: 12px !important;
  font-weight: 700 !important;
  border-bottom: 1px solid #f3f4f6 !important;
}
.module th a { color: #374151 !important; font-weight: 700 !important; }
.module th a:hover { color: #1a6cf1 !important; }
.module td {
  background: #fff !important;
  color: #374151 !important;
  padding: 10px 16px !important;
  font-size: 13px !important;
  border-bottom: 1px solid #f3f4f6 !important;
}
.module td a { color: #1a6cf1 !important; font-weight: 600 !important; text-decoration: none !important; }
.module td a:hover { color: #1558c8 !important; }
.module tr {
  background: #fff !important;
}
.module tr:last-child td { border-bottom: none !important; }
.module tr:hover td { background: #f9fafb !important; }

.addlink, .changelink, .viewlink { font-size: 12px !important; font-weight: 600 !important; }

/* ── Fieldsets ───────────────────────────────── */
fieldset {
  background: #fff !important;
  border: 1px solid #e5e7eb !important;
  border-radius: 12px !important;
  margin-bottom: 20px !important;
  padding: 0 !important;
  box-shadow: 0 1px 3px rgba(0,0,0,.04) !important;
  overflow: hidden !important;
}
fieldset h2 {
  background: #f9fafb !important;
  color: #111827 !important;
  margin: 0 !important;
  padding: 12px 20px !important;
  font-size: 12px !important;
  font-weight: 700 !important;
  text-transform: uppercase !important;
  border-bottom: 1px solid #e5e7eb !important;
  border-radius: 0 !important;
}
fieldset .form-row {
  padding: 12px 20px !important;
  border-bottom: 1px solid #f3f4f6 !important;
  background: #fff !important;
  color: #374151 !important;
}
fieldset .form-row:last-child { border-bottom: none !important; }

/* ── Boutons ─────────────────────────────────── */
.button, input[type=submit], input[type=button],
.submit-row input, a.button {
  background: #1a6cf1 !important;
  border: none !important;
  border-radius: 8px !important;
  font-weight: 600 !important;
  font-size: 13px !important;
  padding: 9px 20px !important;
  cursor: pointer !important;
  transition: all .2s !important;
  box-shadow: 0 1px 2px rgba(26,108,241,.2) !important;
  color: #fff !important;
}
.button:hover, input[type=submit]:hover,
.submit-row input:hover {
  background: #1558c8 !important;
  box-shadow: 0 2px 6px rgba(26,108,241,.3) !important;
}
.button.default, input[type=submit].default,
.submit-row input.default {
  background: #111827 !important;
}
.deletelink, .submit-row a.deletelink {
  background: #ef4444 !important;
  border-radius: 8px !important;
  padding: 9px 20px !important;
  color: #fff !important;
  font-weight: 600 !important;
}
.deletelink:hover { background: #dc2626 !important; }

/* ── Formulaires ─────────────────────────────── */
.form-row input[type=text],
.form-row input[type=url],
.form-row input[type=email],
.form-row input[type=number],
.form-row input[type=password],
.form-row textarea,
.form-row select,
.vTextField, .vURLField {
  border: 1.5px solid #d1d5db !important;
  border-radius: 8px !important;
  padding: 8px 12px !important;
  font-size: 13px !important;
  background: #fff !important;
  color: #374151 !important;
}
.form-row input:focus,
.form-row textarea:focus,
.form-row select:focus {
  border-color: #1a6cf1 !important;
  outline: none !important;
  box-shadow: 0 0 0 3px rgba(26,108,241,.1) !important;
}
.form-row label {
  font-weight: 600 !important;
  font-size: 12px !important;
  color: #374151 !important;
}
.help, .help-tooltip {
  font-size: 11px !important;
  color: #6b7280 !important;
}

/* ── Changelist (listes) ─────────────────────── */
#changelist {
  background: #fff !important;
  border: 1px solid #e5e7eb !important;
  border-radius: 12px !important;
  overflow: hidden !important;
  box-shadow: 0 1px 3px rgba(0,0,0,.04) !important;
}
#changelist table { border: none !important; background: #fff !important; }
#changelist table thead th,
#result_list th,
table thead th {
  background: #f9fafb !important;
  color: #374151 !important;
  font-size: 11px !important;
  font-weight: 700 !important;
  text-transform: uppercase !important;
  letter-spacing: .04em !important;
  padding: 12px 12px !important;
  border-bottom: 1px solid #e5e7eb !important;
  border-top: none !important;
}
#changelist table thead th a,
table thead th a { color: #374151 !important; }
#changelist table thead th a:hover,
table thead th a:hover { color: #1a6cf1 !important; }
#changelist table thead th.sorted { background: #eff6ff !important; }
#changelist table thead th.sorted a { color: #1a6cf1 !important; }

#changelist tbody tr,
#result_list tr,
table tbody tr {
  background: #fff !important;
  border-bottom: 1px solid #f3f4f6 !important;
}
#changelist tbody td,
#result_list td,
table tbody td {
  padding: 10px 12px !important;
  font-size: 13px !important;
  color: #374151 !important;
  background: #fff !important;
}
#changelist tbody td a { color: #1a6cf1 !important; font-weight: 600 !important; }
#changelist tbody tr:hover td,
#result_list tr:hover td,
table tbody tr:hover td { background: #eff6ff !important; }

/* ── Filtres lateraux ─────────────────────────── */
#changelist-filter {
  background: #fff !important;
  border: 1px solid #e5e7eb !important;
  border-radius: 12px !important;
  overflow: hidden !important;
  box-shadow: 0 1px 3px rgba(0,0,0,.04) !important;
}
#changelist-filter h2 {
  background: #f9fafb !important;
  color: #111827 !important;
  font-size: 11px !important;
  font-weight: 700 !important;
  padding: 12px 16px !important;
  border-bottom: 1px solid #e5e7eb !important;
  text-transform: uppercase !important;
}
#changelist-filter h3 {
  font-size: 11px !important;
  font-weight: 700 !important;
  color: #374151 !important;
  text-transform: uppercase !important;
  padding: 10px 16px 4px !important;
}
#changelist-filter ul { padding: 0 16px 8px !important; }
#changelist-filter li a { color: #6b7280 !important; font-size: 13px !important; }
#changelist-filter li.selected a { color: #1a6cf1 !important; font-weight: 700 !important; }
#changelist-filter a:hover { color: #1a6cf1 !important; }

/* ── Actions bar ─────────────────────────────── */
.actions {
  background: #f9fafb !important;
  border: 1px solid #e5e7eb !important;
  border-radius: 8px !important;
  padding: 10px 16px !important;
  margin: 12px !important;
  color: #374151 !important;
}
.actions select {
  border-radius: 8px !important;
  border: 1.5px solid #d1d5db !important;
  font-size: 12px !important;
  padding: 6px 10px !important;
  background: #fff !important;
  color: #374151 !important;
}
.actions label { font-size: 12px !important; font-weight: 600 !important; color: #374151 !important; }
.actions .action-counter { color: #6b7280 !important; }

/* ── Messages flash ──────────────────────────── */
ul.messagelist li {
  padding: 12px 18px !important;
  border-radius: 8px !important;
  margin-bottom: 10px !important;
  font-size: 13px !important;
  border-left: 4px solid !important;
}
ul.messagelist .success { background: #ecfdf5 !important; border-left-color: #10b981 !important; color: #065f46 !important; }
ul.messagelist .warning { background: #fffbeb !important; border-left-color: #f59e0b !important; color: #78350f !important; }
ul.messagelist .error   { background: #fef2f2 !important; border-left-color: #ef4444 !important; color: #7f1d1d !important; }

/* ── Pagination ───────────────────────────────── */
.paginator {
  background: #f9fafb !important;
  border-top: 1px solid #e5e7eb !important;
  color: #374151 !important;
  padding: 12px 16px !important;
}
.paginator a { color: #1a6cf1 !important; }
.paginator .this-page {
  background: #1a6cf1 !important;
  color: #fff !important;
  border-radius: 6px !important;
  padding: 3px 10px !important;
}

/* ── Submit row ──────────────────────────────── */
.submit-row {
  background: #fff !important;
  border: 1px solid #e5e7eb !important;
  border-radius: 12px !important;
  padding: 16px 20px !important;
  box-shadow: 0 1px 3px rgba(0,0,0,.04) !important;
}

/* ── Search ──────────────────────────────────── */
#toolbar {
  background: transparent !important;
  border: none !important;
  color: #374151 !important;
}
#searchbar {
  border: 1.5px solid #d1d5db !important;
  border-radius: 8px !important;
  padding: 8px 14px !important;
  font-size: 13px !important;
  background: #fff !important;
  color: #374151 !important;
}
#searchbar:focus {
  border-color: #1a6cf1 !important;
  box-shadow: 0 0 0 3px rgba(26,108,241,.1) !important;
  outline: none !important;
}

/* ── Object tools ────────────────────────────── */
.object-tools li a {
  background: #fff !important;
  border: 1px solid #e5e7eb !important;
  color: #374151 !important;
  border-radius: 8px !important;
  padding: 7px 14px !important;
  font-size: 12px !important;
  font-weight: 600 !important;
}
.object-tools li a:hover {
  background: #eff6ff !important;
  border-color: #1a6cf1 !important;
  color: #1a6cf1 !important;
}

/* ── Inline groups ───────────────────────────── */
.inline-group {
  background: #fff !important;
  border: 1px solid #e5e7eb !important;
  border-radius: 12px !important;
  overflow: hidden !important;
}

/* ── NAV SIDEBAR — Force white ──────────────── */
#nav-sidebar,
nav.sidebar,
[id="nav-sidebar"],
.sidebar {
  background: #fff !important;
  border-right: 1px solid #e5e7eb !important;
  color: #374151 !important;
}
#nav-sidebar *,
nav.sidebar * {
  color: inherit !important;
}
#nav-sidebar .module,
nav.sidebar .module {
  background: #fff !important;
  border: none !important;
  box-shadow: none !important;
  border-radius: 0 !important;
}
#nav-sidebar .module h2,
nav.sidebar .module h2 {
  background: #fff !important;
  color: #9ca3af !important;
  border-bottom: 1px solid #f3f4f6 !important;
  font-size: 10px !important;
  font-weight: 700 !important;
  text-transform: uppercase !important;
  letter-spacing: .06em !important;
  padding: 16px 16px 8px !important;
}
#nav-sidebar table,
nav.sidebar table {
  background: #fff !important;
}
#nav-sidebar tr,
nav.sidebar tr,
#nav-sidebar th,
nav.sidebar th,
#nav-sidebar td,
nav.sidebar td {
  background: #fff !important;
  border: none !important;
  padding: 0 !important;
}
#nav-sidebar th {
  padding: 8px 16px 2px !important;
}
#nav-sidebar th a {
  color: #111827 !important;
  font-weight: 700 !important;
  font-size: 13px !important;
  text-decoration: none !important;
}
#nav-sidebar th a:hover { color: #1a6cf1 !important; }
#nav-sidebar td {
  padding: 2px 16px 8px !important;
}
#nav-sidebar td a {
  color: #9ca3af !important;
  font-size: 11px !important;
  font-weight: 500 !important;
  text-decoration: none !important;
}
#nav-sidebar td a:hover { color: #1a6cf1 !important; }
#nav-sidebar .current-app th a { color: #1a6cf1 !important; }

/* Toggle sidebar button */
#toggle-nav-sidebar {
  background: #fff !important;
  border-right: 1px solid #e5e7eb !important;
  color: #9ca3af !important;
}
#toggle-nav-sidebar:hover { color: #1a6cf1 !important; }

/* ── Filter input in sidebar ─────────────────── */
#nav-filter {
  background: #f9fafb !important;
  border: 1px solid #e5e7eb !important;
  border-radius: 6px !important;
  color: #374151 !important;
  padding: 6px 10px !important;
  font-size: 12px !important;
}
#nav-filter::placeholder { color: #9ca3af !important; }

/* ── Related widgets ─────────────────────────── */
.related-widget-wrapper { display: flex; align-items: center; gap: 6px; }

/* ── Photo thumbs ────────────────────────────── */
.field-photo_thumb img {
  border: 1px solid #e5e7eb !important;
  border-radius: 6px !important;
}

/* ── Calendar & date widgets ─────────────────── */
.calendarbox, .clockbox {
  border-radius: 8px !important;
  overflow: hidden !important;
  box-shadow: 0 4px 12px rgba(0,0,0,.1) !important;
  background: #fff !important;
}
.calendarbox th, .calendarbox td { background: #fff !important; color: #374151 !important; }

/* ── Login page ──────────────────────────────── */
.login #header { background: #fff !important; }
.login #content {
  background: #fff !important;
  border: 1px solid #e5e7eb !important;
  border-radius: 12px !important;
  box-shadow: 0 4px 12px rgba(0,0,0,.06) !important;
  padding: 32px !important;
}

/* ── Responsive ──────────────────────────────── */
@media (max-width: 767px) {
  #header { padding: 10px 16px !important; }
  #content { padding: 16px !important; }
}
</style>
{% endblock %}
