<!-- PUB STRIP COMPACT -->
<div class="mb-8">
  {% if current_strip %}
  <a href="{{ current_strip.lien }}" target="_blank" rel="noopener sponsored"
     class="pub-strip-img-wrap">
    {% if current_strip.is_video %}
    <video src="{{ current_strip.get_video }}" class="pub-strip-img" autoplay muted loop playsinline></video>
    {% else %}
    <img src="{{ current_strip.get_image }}"
         alt="{{ current_strip.titre }}"
         class="pub-strip-img" loading="lazy">
    {% endif %}
  </a>
  {% else %}
  <a href="{% url 'deposer_pub' %}" class="billboard-milieu-empty" style="position:relative;display:block;min-height:80px">
    <canvas class="pub-space-canvas"></canvas>
    <div class="pub-space-text"><span class="pub-txt-main pub-txt-visible">Votre publicit&eacute; ici</span><span class="pub-txt-phone">89 61 06 13</span></div>
    <div style="position:absolute;bottom:6px;left:0;right:0;text-align:center;z-index:2;font-size:11px;color:rgba(255,255,255,.3)">8 000 XPF/mois</div>
  </a>
  {% endif %}
</div>
