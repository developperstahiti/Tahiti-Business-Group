<!-- PUB CATÉGORIE : {{ position }} -->
{% if pub %}
<div class="pub-cat-encart my-6 rounded-2xl overflow-hidden shadow-sm border border-gray-200">
  <a href="{{ pub.lien }}" target="_blank" rel="noopener sponsored" class="block relative">
    <div class="absolute top-2 left-2 bg-black/40 text-white text-[10px] font-bold px-2 py-0.5 rounded-full backdrop-blur-sm z-10">Sponsorisé</div>
    {% if pub.is_video %}
    <video src="{{ pub.get_video }}" class="w-full h-auto block" autoplay muted loop playsinline></video>
    {% elif pub.get_image %}
    <img src="{{ pub.get_image }}" alt="{{ pub.titre }}" class="w-full h-auto block" loading="lazy">
    {% else %}
    <div class="h-28 bg-gradient-to-r from-blue-600 to-blue-700 flex items-center justify-center text-white font-bold text-lg">
      {{ pub.titre }}
    </div>
    {% endif %}
  </a>
</div>
{% elif cat_active %}
<div class="pub-cat-encart my-6">
  <a href="{% url 'deposer_pub' %}?emplacement={{ emplacement }}&categorie={{ cat_active }}"
     class="pub-empty block" style="min-height:90px;border-radius:12px">
    <span class="pub-star" style="top:6%;left:6%;animation-delay:0s"></span>
    <span class="pub-star pub-star--lg" style="top:12%;left:40%;animation-delay:.4s"></span>
    <span class="pub-star" style="top:8%;left:75%;animation-delay:.8s"></span>
    <span class="pub-star" style="top:25%;left:18%;animation-delay:1.2s"></span>
    <span class="pub-star pub-star--lg" style="top:30%;left:62%;animation-delay:1.6s"></span>
    <span class="pub-star" style="top:22%;left:88%;animation-delay:2s"></span>
    <span class="pub-star" style="top:45%;left:10%;animation-delay:2.4s"></span>
    <span class="pub-star pub-star--lg" style="top:50%;left:50%;animation-delay:2.8s"></span>
    <span class="pub-star" style="top:48%;left:82%;animation-delay:.3s"></span>
    <span class="pub-star" style="top:65%;left:25%;animation-delay:.7s"></span>
    <span class="pub-star pub-star--lg" style="top:72%;left:70%;animation-delay:1.1s"></span>
    <span class="pub-star" style="top:80%;left:42%;animation-delay:1.5s"></span>
    <span class="pub-star" style="top:88%;left:85%;animation-delay:2.2s"></span>
    <span class="pub-star" style="top:92%;left:15%;animation-delay:2.7s"></span>
    <div class="pub-empty__zone">{{ position|default:emplacement }}</div>
    <div class="pub-empty__title" style="font-size:14px">Votre pub ici</div>
    <div class="pub-empty__price">{{ prix_label }}</div>
    <span class="pub-empty__cta" style="font-size:12px;padding:6px 16px">Réserver →</span>
  </a>
</div>
{% endif %}
